name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:"

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env from environment variables
        run: |
          echo "SUPABASE_URL=${{ vars.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}" >> .env

      - name: Generate envied config
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
